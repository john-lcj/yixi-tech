<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="50%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2d7ff9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(45,127,249,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(45,127,249,0)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- City silhouette -->
  <g fill="rgba(255,255,255,0.06)">
    <rect x="50" y="350" width="60" height="250"/>
    <rect x="130" y="280" width="80" height="320"/>
    <rect x="230" y="320" width="50" height="280"/>
    <rect x="300" y="200" width="100" height="400"/>
    <rect x="420" y="300" width="70" height="300"/>
    <rect x="510" y="250" width="90" height="350"/>
    <rect x="620" y="180" width="120" height="420"/>
    <rect x="760" y="300" width="60" height="300"/>
    <rect x="840" y="220" width="100" height="380"/>
    <rect x="960" y="280" width="80" height="320"/>
    <rect x="1060" y="330" width="70" height="270"/>
  </g>
  <!-- Glow -->
  <ellipse cx="600" cy="300" rx="400" ry="200" fill="rgba(45,127,249,0.08)"/>
  <!-- Circuit lines -->
  <g stroke="rgba(45,127,249,0.2)" stroke-width="1" fill="none">
    <path d="M0,400 L300,400 L300,350 L500,350"/>
    <path d="M1200,350 L900,350 L900,300 L700,300"/>
    <circle cx="500" cy="350" r="4" fill="rgba(45,127,249,0.5)"/>
    <circle cx="700" cy="300" r="4" fill="rgba(45,127,249,0.5)"/>
    <path d="M200,500 L400,500 L400,450 L600,450"/>
    <circle cx="600" cy="450" r="4" fill="rgba(45,127,249,0.5)"/>
  </g>
  <!-- Text -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white">YIXI TECHNOLOGY</text>
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" letter-spacing="6">PRECISION OPTICS &amp; INTERNATIONAL TRADE</text>
  <!-- Accent line -->
  <rect x="520" y="320" width="160" height="3" rx="1.5" fill="#2d7ff9"/>
  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="3">EST. 2023 · SHANGHAI</text>
</svg>
